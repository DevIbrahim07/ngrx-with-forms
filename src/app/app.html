<main class="min-h-screen overflow-hidden px-4 py-10 sm:px-6 lg:px-8">
  <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_20%,rgba(14,165,233,0.22),transparent_30%),radial-gradient(circle_at_80%_25%,rgba(34,197,94,0.2),transparent_28%),radial-gradient(circle_at_50%_85%,rgba(15,23,42,0.08),transparent_30%),linear-gradient(135deg,#f8fafc,#f0f9ff_45%,#ecfeff)]"></div>

  <section class="form-shell mx-auto w-full max-w-5xl overflow-hidden rounded-4xl border border-white/70 bg-white/70 shadow-2xl shadow-slate-900/10 backdrop-blur-xl">
    <div class="grid gap-0 lg:grid-cols-[1.05fr_0.95fr]">
      <div class="relative p-6 sm:p-8 lg:p-10">
        <div class="pointer-events-none absolute inset-0 bg-[linear-gradient(135deg,rgba(15,23,42,0.04),transparent_45%)]"></div>
        <p class="relative text-xs font-semibold uppercase tracking-[0.28em] text-sky-600">NgRx + Forms</p>
        <h1 class="relative mt-3 text-3xl font-black text-slate-900 sm:text-4xl lg:text-5xl">A cleaner form experience</h1>
        

        @if (form$ | async; as form) {
          <div class="relative mt-8 space-y-4">
            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">Name</span>
              <input
                class="form-input w-full rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-sky-400 focus:ring-4 focus:ring-sky-500/10"
                type="text"
                placeholder="Enter Name"
                [value]="form.name"
                (input)="updateField('name', $event.target.value)"
              />
            </label>

            <label class="block">
              <span class="mb-2 block text-sm font-semibold text-slate-700">Email</span>
              <input
                class="form-input w-full rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-slate-900 shadow-sm outline-none transition placeholder:text-slate-400 focus:border-emerald-400 focus:ring-4 focus:ring-emerald-500/10"
                type="email"
                placeholder="Enter Email"
                [value]="form.email"
                (input)="updateField('email', $event.target.value)"
              />
            </label>

            <div class="flex flex-col gap-3 pt-2 sm:flex-row">
              <button
                type="button"
                class="action-btn inline-flex items-center justify-center rounded-2xl bg-slate-900 px-5 py-3 text-sm font-bold uppercase tracking-wide text-white shadow-lg shadow-slate-900/20 transition hover:-translate-y-0.5 hover:bg-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-900/40"
                (click)="resetForm()"
              >
                Reset form
              </button>
             
            </div>
          </div>
        }
      </div>

      @if (form$ | async; as form) {
        <aside class="preview-panel border-t border-slate-200/70 bg-slate-950 p-6 text-white sm:p-8 lg:border-l lg:border-t-0 lg:p-10">
          <div class="flex items-center justify-between gap-4">
            <div>
              <p class="text-xs font-semibold uppercase tracking-[0.28em] text-cyan-300">Preview</p>
              <h2 class="mt-2 text-2xl font-bold text-white">Current form state</h2>
            </div>
            <div class="h-12 w-12 rounded-2xl bg-white/10 ring-1 ring-white/10"></div>
          </div>

          <div class="mt-8 rounded-3xl border border-white/10 bg-white/5 p-4 shadow-inner shadow-black/20">
            <div class="mb-4 flex items-center gap-2 text-xs uppercase tracking-[0.24em] text-slate-400">
              <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
              JSON snapshot
            </div>
            <pre class="overflow-auto rounded-2xl bg-black/20 p-4 text-sm leading-6 text-cyan-100">{{ form | json }}</pre>
          </div>
        </aside>
      }
    </div>
  </section>
</main>
